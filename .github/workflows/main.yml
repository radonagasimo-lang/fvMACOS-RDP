name: macOS-Tailscale
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2

      - name: Install & Connect Tailscale
        run: |
          brew install tailscale
          sudo tailscaled install-system-daemon
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=Aeron-Mac

      - name: Setting up the Mac Account
        run: source setup.sh "Aeroniscoolmc2" ""

      - name: Show Tailscale IP
        run: tailscale ip -4

      - name: Keep Alive
        run: sleep 21600
